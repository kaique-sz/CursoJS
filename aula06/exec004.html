<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        var nome = window.prompt('Qual é o seu nome? ')

        document.write(`Olá ${nome}. Seu nome possui ${nome.length} letras <br/>`)// .length para quantidade de letras

        document.write(`Olá ${nome}. Seu nome em maiusculas é ${nome.toUpperCase()} <br/>`) // .toUpperCase para letras maiusculas

        document.write(`Olá ${nome}. Seu nome em minusculas é ${nome.toLowerCase()}`) // .toLowerCase para letras minusculas
    </script>
</body>
</html>
