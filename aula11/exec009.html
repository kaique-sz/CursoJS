<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>País</title>

</head>
<body>
    
    <h1>País de origem</h1>

    <input type="text" name="txtorg" id="txtorg">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>

    <script>

        function verificar() {
        
        var pais = window.document.getElementById(`txtorg`).value
        var res = window.document.getElementById(`res`)
        
        if (pais == `Brasil`) {

            res.innerHTML = `<p>Seu país de origem é Brasileiro </p>`

        }
        else {

            res.innerHTML       = `<p>Seu país é de origem Estrangeira </P>`
        }
        
            
        }
    </script>
</body>
</html>
